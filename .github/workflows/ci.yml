name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check cogno_gateway tests examples
      - name: Type-check (mypy)
        run: mypy cogno_gateway
      - name: Unit tests
        # Provider API calls are mocked (fake httpx); no network needed.
        run: pytest tests/unit -q --cov=cogno_gateway --cov-report=term-missing --cov-fail-under=85
      - name: Integration tests (real httpx via MockTransport, no network)
        run: pytest tests/integration -q
